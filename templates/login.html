<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to access your personalized career intelligence assessment.">
    <title>Sign In — AI Career Mentor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>">
    <style>
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; }
        .login-card { width: 100%; max-width: 440px; padding: 48px 40px; text-align: center; z-index: 2; position: relative; }
        .login-card .brand-icon-lg { width: 64px; height: 64px; background: var(--gradient-primary); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 24px; box-shadow: var(--shadow-glow); }
        .login-card h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .login-card .subtitle { color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 32px; }
        .login-form { display: flex; flex-direction: column; gap: 14px; text-align: left; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
        .form-input { width: 100%; padding: 14px 16px; background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-sans); font-size: 0.95rem; outline: none; transition: all var(--transition-fast); }
        .form-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(var(--accent-primary-rgb), 0.15); }
        .form-input::placeholder { color: var(--text-muted); }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px; background: var(--bg-glass); border: 1px solid var(--border-medium); border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-sans); font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all var(--transition-base); margin-top: 8px; }
        .google-btn:hover { background: var(--bg-glass-hover); border-color: var(--accent-primary); }
        .google-btn svg { width: 20px; height: 20px; }
        .divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; color: var(--text-muted); font-size: 0.82rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }
        .form-note { font-size: 0.78rem; color: var(--text-muted); margin-top: 16px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="hero-bg-orb" style="width:350px;height:350px;background:var(--accent-primary);top:20%;left:15%;position:absolute;border-radius:50%;filter:blur(120px);opacity:0.2;"></div>
        <div class="hero-bg-orb" style="width:250px;height:250px;background:var(--accent-secondary);bottom:20%;right:15%;position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;"></div>

        <div class="glass-card login-card">
            <div class="brand-icon-lg"></div>
            <h1>Welcome to <span class="gradient-text">AI Career Mentor</span></h1>
            <p class="subtitle">Sign in to begin your personalized career intelligence assessment</p>

            <!-- Simulated Google OAuth -->
            <button class="google-btn" id="googleBtn" onclick="simulateGoogleAuth()">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="divider">or sign in with details</div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="userName">Your Name</label>
                    <input type="text" id="userName" class="form-input" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="userEmail">Email Address</label>
                    <input type="email" id="userEmail" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="userLocation">Location</label>
                    <input type="text" id="userLocation" class="form-input" placeholder="Pune, Maharashtra" value="Pune, Maharashtra">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 8px;">
                     Begin Assessment
                </button>
            </form>

            <p class="form-note">
                Your data is stored locally in your session. We don't share information with third parties.
                This simulates Google OAuth for demonstration purposes.
            </p>
        </div>
    </div>

    <script>
        function simulateGoogleAuth() {
            // Simulate Google OAuth popup
            const name = "User " + Math.floor(Math.random() * 1000);
            const email = name.toLowerCase().replace(' ', '.') + "@gmail.com";
            submitAuth(name, email, "Pune, Maharashtra");
        }

        function handleLogin(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const location = document.getElementById('userLocation').value.trim();
            if (name && email) {
                submitAuth(name, email, location);
            }
        }

        async function submitAuth(name, email, location) {
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, location})
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/chat';
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            }
        }
    </script>
</body>
</html>
